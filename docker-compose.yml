services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: starlabs-postgres
    environment:
      POSTGRES_USER: starlabs
      POSTGRES_PASSWORD: starlabs_dev_password
      POSTGRES_DB: starlabs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starlabs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: starlabs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: starlabs-app
    environment:
      DATABASE_URL: postgresql://starlabs:starlabs_dev_password@postgres:5432/starlabs
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      JWT_SECRET: dev_secret_key_change_in_production
      ADMIN_SECRET: openloop-admin-2026
      NEXT_PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "
        npm run db:migrate &&
        npm run db:seed &&
        npm run dev
      "

  # pgAdmin for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: starlabs-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@starlabs.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: starlabs-network
